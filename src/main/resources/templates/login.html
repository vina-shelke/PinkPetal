<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - PinkPetal</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" href="../static/css/style.css" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="auth-container pink-card">
            <!-- Branding Header -->
            <div class="auth-header">
                <a th:href="@{/}">
                    <img th:src="@{/images/logo.png}" src="../static/images/logo.png" alt="PinkPetal Logo">
                </a>
                <h2>🌸 PinkPetal</h2>
                <p class="text-muted">Smart Women Wellness & Period Tracking</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <div id="tab-login" class="auth-tab active" onclick="switchAuthTab('login')">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>Login
                </div>
                <div id="tab-register" class="auth-tab" onclick="switchAuthTab('register')">
                    <i class="fa-solid fa-user-plus me-2"></i>Sign Up
                </div>
            </div>

            <!-- Error / Success Alert Messages -->
            <div th:if="${loginError}" class="alert alert-danger alert-dismissible fade show" role="alert" style="border-radius: var(--border-radius-sm)">
                <i class="fa-solid fa-circle-exclamation me-2"></i><span th:text="${loginError}">Error occurred</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${registerError}" class="alert alert-danger alert-dismissible fade show" role="alert" style="border-radius: var(--border-radius-sm)">
                <i class="fa-solid fa-circle-exclamation me-2"></i><span th:text="${registerError}">Error occurred</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${registerSuccess}" class="alert alert-success alert-dismissible fade show" role="alert" style="border-radius: var(--border-radius-sm)">
                <i class="fa-solid fa-circle-check me-2"></i><span th:text="${registerSuccess}">Success!</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Login Form -->
            <form id="form-login" class="auth-form active" th:action="@{/login}" method="POST">
                <div class="mb-3">
                    <label for="login-username" class="form-label fw-bold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0" style="border-color: var(--border-pink)"><i class="fa-regular fa-user text-muted"></i></span>
                        <input type="text" class="form-control border-start-0" id="login-username" name="username" placeholder="Enter your username" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="login-password" class="form-label fw-bold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0" style="border-color: var(--border-pink)"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" class="form-control border-start-0" id="login-password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-brand">Sign In</button>
                </div>
                <div class="text-center text-sm">
                    <span class="text-muted">For administrative access, log in using username <code>admin</code>.</span>
                </div>
            </form>

            <!-- Register Form -->
            <form id="form-register" class="auth-form" th:action="@{/register}" method="POST">
                <div class="mb-3">
                    <label for="register-name" class="form-label fw-bold">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0" style="border-color: var(--border-pink)"><i class="fa-solid fa-signature text-muted"></i></span>
                        <input type="text" class="form-control border-start-0" id="register-name" name="name" placeholder="e.g. Aditi Patil" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="register-username" class="form-label fw-bold">Choose Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0" style="border-color: var(--border-pink)"><i class="fa-regular fa-user text-muted"></i></span>
                        <input type="text" class="form-control border-start-0" id="register-username" name="username" placeholder="e.g. Ella" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="register-password" class="form-label fw-bold">Create Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0" style="border-color: var(--border-pink)"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" class="form-control border-start-0" id="register-password" name="password" placeholder="Create a secure password" required>
                    </div>
                </div>
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-brand">Create Account</button>
                </div>
            </form>

            <div class="text-center mt-4">
                <a th:href="@{/}" class="text-decoration-none text-muted"><i class="fa-solid fa-arrow-left-long me-2"></i>Back to Landing Page</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script th:src="@{/js/script.js}" src="../static/js/script.js"></script>
    
    <!-- Proactive Tab Switch if Register Errors Occurred -->
    <script th:if="${registerError}">
        switchAuthTab('register');
    </script>
</body>
</html>
